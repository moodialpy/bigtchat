<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kick Chat Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --border:    #1e1e2e;
      --kick:      #53fc18;
      --kick-dim:  #2a7a0a;
      --text:      #e2e2f0;
      --muted:     #555570;
      --danger:    #ff4466;
      --radius:    6px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      overflow: hidden;
    }

    /* ── Scanline texture overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.07) 2px,
        rgba(0,0,0,.07) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      color: var(--kick);
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .logo span { color: var(--text); }

    .channel-info {
      flex: 1;
      min-width: 0;
    }
    .channel-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .channel-status {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      margin-right: 5px;
      vertical-align: middle;
      transition: background .3s;
    }
    .status-dot.live {
      background: var(--kick);
      box-shadow: 0 0 6px var(--kick);
      animation: pulse 2s infinite;
    }
    .status-dot.error { background: var(--danger); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }

    .viewer-count {
      font-size: 11px;
      color: var(--kick-dim);
      background: rgba(83,252,24,.06);
      border: 1px solid rgba(83,252,24,.15);
      padding: 3px 8px;
      border-radius: var(--radius);
      white-space: nowrap;
      display: none;
    }
    .viewer-count.visible { display: block; }

    /* ── Status bar ── */
    #status-bar {
      padding: 8px 18px;
      font-size: 11px;
      color: var(--muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #status-bar.error-bar { color: var(--danger); }

    /* ── Chat messages ── */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      scroll-behavior: smooth;
    }
    #chat-container::-webkit-scrollbar { width: 4px; }
    #chat-container::-webkit-scrollbar-track { background: transparent; }
    #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      padding: 5px 18px;
      line-height: 1.55;
      animation: fadeIn .15s ease;
      word-break: break-word;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg:hover { background: rgba(255,255,255,.02); }

    .msg-meta {
      display: inline;
    }
    .msg-badges {
      display: inline-flex;
      gap: 3px;
      vertical-align: middle;
      margin-right: 4px;
    }
    .badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 4px;
      border-radius: 3px;
      letter-spacing: .4px;
      text-transform: uppercase;
    }
    .badge-broadcaster { background: var(--kick);    color: #000; }
    .badge-moderator   { background: #3b82f6;        color: #fff; }
    .badge-subscriber  { background: rgba(83,252,24,.15); color: var(--kick); border: 1px solid rgba(83,252,24,.3); }
    .badge-og          { background: #7c3aed;        color: #fff; }
    .badge-vip         { background: #f59e0b;        color: #000; }

    .msg-user {
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }
    .msg-user:hover { text-decoration: underline; }

    .msg-sep  { color: var(--muted); margin: 0 3px; }
    .msg-text { color: var(--text); }

    .msg-time {
      font-size: 10px;
      color: var(--muted);
      margin-left: 6px;
    }

    /* system messages */
    .msg-system {
      color: var(--muted);
      font-style: italic;
      font-size: 12px;
      padding: 6px 18px;
    }

    /* ── Scroll to bottom button ── */
    #scroll-btn {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--kick);
      color: #000;
      border: none;
      padding: 7px 16px;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      display: none;
      z-index: 10;
      letter-spacing: .5px;
    }
    #scroll-btn.visible { display: block; }
    #scroll-btn:hover { filter: brightness(1.1); }

    /* ── Footer ── */
    footer {
      padding: 10px 18px;
      font-size: 10px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer a {
      color: var(--kick-dim);
      text-decoration: none;
    }
    footer a:hover { color: var(--kick); }

    /* ── Wrapper ── */
    #chat-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    /* ── Empty state ── */
    #empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    #empty .big { font-size: 40px; line-height: 1; }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">KICK<span>.</span></div>
    <div class="channel-info">
      <div class="channel-name" id="hdr-name">Caricamento…</div>
      <div class="channel-status">
        <span class="status-dot" id="dot"></span>
        <span id="hdr-status">connessione…</span>
      </div>
    </div>
    <div class="viewer-count" id="viewer-count">👁 —</div>
  </header>

  <div id="status-bar">Lettura config.json…</div>

  <div id="chat-wrap">
    <div id="chat-container">
      <div id="empty">
        <div class="big">💬</div>
        <div>In attesa di messaggi…</div>
      </div>
    </div>
    <button id="scroll-btn" onclick="scrollToBottom()">↓ nuovi messaggi</button>
  </div>

  <footer>
    <span>kick-chat-viewer</span>
    <a href="https://kick.com" target="_blank">kick.com</a>
  </footer>
</div>

<!-- Pusher SDK (CDN, no build needed) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pusher/8.3.0/pusher.min.js"></script>
<script>
// ─────────────────────────────────────────────
//  Kick Chat Viewer — GitHub Pages ready
//  Configura "streamer" in config.json
// ─────────────────────────────────────────────

const PUSHER_KEY    = 'eb1d5f283081a78b932c';
const PUSHER_CLUSTER = 'us2';
const KICK_API      = 'https://kick.com/api/v2/channels/';
const MAX_MESSAGES  = 200; // quanti messaggi tenere in DOM

const chatEl    = document.getElementById('chat-container');
const statusBar = document.getElementById('status-bar');
const dot       = document.getElementById('dot');
const hdrName   = document.getElementById('hdr-name');
const hdrStatus = document.getElementById('hdr-status');
const scrollBtn = document.getElementById('scroll-btn');
const viewerEl  = document.getElementById('viewer-count');
const emptyEl   = document.getElementById('empty');

let autoScroll  = true;
let msgCount    = 0;

// ── Scroll tracking ──
chatEl.addEventListener('scroll', () => {
  const atBottom = chatEl.scrollHeight - chatEl.scrollTop - chatEl.clientHeight < 60;
  autoScroll = atBottom;
  scrollBtn.classList.toggle('visible', !atBottom);
});

function scrollToBottom() {
  chatEl.scrollTo({ top: chatEl.scrollHeight, behavior: 'smooth' });
  autoScroll = true;
  scrollBtn.classList.remove('visible');
}

// ── Status helpers ──
function setStatus(msg, isError = false) {
  statusBar.textContent = msg;
  statusBar.className = isError ? 'error-bar' : '';
}

function setConnected(slug) {
  dot.className = 'status-dot live';
  hdrStatus.textContent = 'LIVE';
  hdrName.textContent = slug;
  setStatus(`Connesso a kick.com/${slug}`);
}

function setOffline(slug) {
  dot.className = 'status-dot';
  hdrStatus.textContent = 'offline';
  hdrName.textContent = slug;
  setStatus(`Connesso alla chat di ${slug} (stream offline)`);
}

// ── Badge rendering ──
function renderBadges(badges) {
  if (!badges || badges.length === 0) return '';
  return badges.map(b => {
    const type = b.type || '';
    let cls = 'badge';
    if (type === 'broadcaster')  cls += ' badge-broadcaster';
    else if (type === 'moderator') cls += ' badge-moderator';
    else if (type === 'subscriber') cls += ' badge-subscriber';
    else if (type === 'og')      cls += ' badge-og';
    else if (type === 'vip')     cls += ' badge-vip';
    else cls += ' badge-subscriber';
    return `<span class="${cls}">${type.substring(0,3)}</span>`;
  }).join('');
}

// ── Color from username (deterministic) ──
function colorFromName(name) {
  const colors = [
    '#53fc18','#3b82f6','#f59e0b','#ec4899',
    '#06b6d4','#8b5cf6','#f97316','#10b981',
  ];
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return colors[Math.abs(hash) % colors.length];
}

// ── Render a chat message ──
function addMessage(data) {
  if (emptyEl) emptyEl.remove();

  const sender  = data.sender  || {};
  const content = data.content || data.message || '';
  const username = sender.username || sender.slug || '???';
  const badges  = renderBadges(sender.identity?.badges || []);
  const color   = sender.identity?.color || colorFromName(username);
  const now     = new Date();
  const time    = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `
    <span class="msg-meta">
      <span class="msg-badges">${badges}</span>
      <span class="msg-user" style="color:${color}">${escHtml(username)}</span>
      <span class="msg-sep">:</span>
    </span>
    <span class="msg-text">${escHtml(content)}</span>
    <span class="msg-time">${time}</span>
  `;

  chatEl.appendChild(div);
  msgCount++;

  // Trim old messages
  if (msgCount > MAX_MESSAGES) {
    const first = chatEl.querySelector('.msg');
    if (first) { first.remove(); msgCount--; }
  }

  if (autoScroll) scrollToBottom();
}

function addSystemMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg-system';
  div.textContent = text;
  chatEl.appendChild(div);
  if (autoScroll) scrollToBottom();
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ── Main: carica config → ottieni channel info → connetti WebSocket ──
async function init() {
  // 1. Leggi config.json
  let config;
  try {
    const res = await fetch('./config.json?_=' + Date.now());
    config = await res.json();
  } catch (e) {
    setStatus('Errore: impossibile leggere config.json', true);
    return;
  }

  const streamer = (config.streamer || '').trim().toLowerCase();
  if (!streamer) {
    setStatus('Errore: campo "streamer" mancante in config.json', true);
    return;
  }

  hdrName.textContent = streamer;
  setStatus(`Recupero info canale per "${streamer}"…`);

  // 2. Chiama API Kick per ottenere il chatroom_id
  let chatroomId;
  try {
    const res = await fetch(KICK_API + streamer, {
      headers: { 'Accept': 'application/json' }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    chatroomId = data.chatroom?.id;
    const isLive = data.livestream != null;
    const viewers = data.livestream?.viewer_count;

    if (isLive) {
      setConnected(streamer);
      if (viewers != null) {
        viewerEl.textContent = `👁 ${viewers.toLocaleString('it')}`;
        viewerEl.classList.add('visible');
      }
    } else {
      setOffline(streamer);
    }
  } catch (e) {
    // Prova endpoint v1 come fallback
    try {
      const res = await fetch(`https://kick.com/api/v1/channels/${streamer}`);
      const data = await res.json();
      chatroomId = data.chatroom?.id;
      setOffline(streamer);
    } catch {
      setStatus(`Errore: canale "${streamer}" non trovato su Kick`, true);
      dot.className = 'status-dot error';
      return;
    }
  }

  if (!chatroomId) {
    setStatus('Errore: chatroom ID non trovato', true);
    return;
  }

  // 3. Connetti Pusher WebSocket
  setStatus(`Connessione WebSocket (chatroom #${chatroomId})…`);

  const pusher = new Pusher(PUSHER_KEY, {
    cluster: PUSHER_CLUSTER,
    forceTLS: true,
  });

  const channel = pusher.subscribe(`chatrooms.${chatroomId}.v2`);

  channel.bind('App\\Events\\ChatMessageSent', (data) => {
    addMessage(data);
  });

  pusher.connection.bind('connected', () => {
    addSystemMsg('✓ Connesso alla chat');
  });

  pusher.connection.bind('disconnected', () => {
    dot.className = 'status-dot';
    hdrStatus.textContent = 'disconnesso';
    setStatus('Disconnesso — riconnessione…', true);
    addSystemMsg('⚠ Disconnesso dalla chat, riconnessione…');
  });

  pusher.connection.bind('error', (err) => {
    setStatus('Errore WebSocket: ' + (err?.message || err), true);
    dot.className = 'status-dot error';
  });
}

init();
</script>
</body>
</html>
