<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kick Chat Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #111118;
      --border:    #1e1e2e;
      --kick:      #53fc18;
      --kick-dim:  #2a7a0a;
      --text:      #e2e2f0;
      --muted:     #555570;
      --danger:    #ff4466;
      --radius:    6px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      overflow: hidden;
    }

    /* ── Scanline texture overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.07) 2px,
        rgba(0,0,0,.07) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 20px;
      color: var(--kick);
      letter-spacing: -0.5px;
      line-height: 1;
    }
    .logo span { color: var(--text); }

    .channel-info {
      flex: 1;
      min-width: 0;
    }
    .channel-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .channel-status {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--muted);
      margin-right: 5px;
      vertical-align: middle;
      transition: background .3s;
    }
    .status-dot.live {
      background: var(--kick);
      box-shadow: 0 0 6px var(--kick);
      animation: pulse 2s infinite;
    }
    .status-dot.error { background: var(--danger); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }

    .viewer-count {
      font-size: 11px;
      color: var(--kick-dim);
      background: rgba(83,252,24,.06);
      border: 1px solid rgba(83,252,24,.15);
      padding: 3px 8px;
      border-radius: var(--radius);
      white-space: nowrap;
      display: none;
    }
    .viewer-count.visible { display: block; }

    /* ── Status bar ── */
    #status-bar {
      padding: 8px 18px;
      font-size: 11px;
      color: var(--muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 32px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #status-bar.error-bar { color: var(--danger); }

    /* ── Chat messages ── */
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      scroll-behavior: smooth;
    }
    #chat-container::-webkit-scrollbar { width: 4px; }
    #chat-container::-webkit-scrollbar-track { background: transparent; }
    #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      padding: 5px 18px;
      line-height: 1.55;
      animation: fadeIn .15s ease;
      word-break: break-word;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg:hover { background: rgba(255,255,255,.02); }

    .msg-meta {
      display: inline;
    }
    .msg-badges {
      display: inline-flex;
      gap: 3px;
      vertical-align: middle;
      margin-right: 4px;
    }
    .badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 4px;
      border-radius: 3px;
      letter-spacing: .4px;
      text-transform: uppercase;
    }
    .badge-broadcaster { background: var(--kick);    color: #000; }
    .badge-moderator   { background: #3b82f6;        color: #fff; }
    .badge-subscriber  { background: rgba(83,252,24,.15); color: var(--kick); border: 1px solid rgba(83,252,24,.3); }
    .badge-og          { background: #7c3aed;        color: #fff; }
    .badge-vip         { background: #f59e0b;        color: #000; }

    .msg-user {
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }
    .msg-user:hover { text-decoration: underline; }

    .msg-sep  { color: var(--muted); margin: 0 3px; }
    .msg-text { color: var(--text); }

    .msg-time {
      font-size: 10px;
      color: var(--muted);
      margin-left: 6px;
    }

    /* system messages */
    .msg-system {
      color: var(--muted);
      font-style: italic;
      font-size: 12px;
      padding: 6px 18px;
    }

    /* ── Scroll to bottom button ── */
    #scroll-btn {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--kick);
      color: #000;
      border: none;
      padding: 7px 16px;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      display: none;
      z-index: 10;
      letter-spacing: .5px;
    }
    #scroll-btn.visible { display: block; }
    #scroll-btn:hover { filter: brightness(1.1); }

    /* ── Footer ── */
    footer {
      padding: 10px 18px;
      font-size: 10px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer a {
      color: var(--kick-dim);
      text-decoration: none;
    }
    footer a:hover { color: var(--kick); }

    /* ── Wrapper ── */
    #chat-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    /* ── Empty state ── */
    #empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    #empty .big { font-size: 40px; line-height: 1; }

    /* ── Log panel ── */
    #log-toggle {
      position: fixed;
      bottom: 14px;
      right: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      padding: 5px 10px;
      border-radius: var(--radius);
      cursor: pointer;
      z-index: 100;
      transition: border-color .2s, color .2s;
    }
    #log-toggle:hover { border-color: var(--kick); color: var(--kick); }
    #log-toggle.has-error { border-color: var(--danger); color: var(--danger); }

    #log-panel {
      position: fixed;
      bottom: 46px;
      right: 14px;
      width: min(420px, calc(100vw - 28px));
      max-height: 55vh;
      background: #0d0d14;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: none;
      flex-direction: column;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0,0,0,.6);
    }
    #log-panel.open { display: flex; }

    #log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      flex-shrink: 0;
    }
    #log-header strong { color: var(--text); font-size: 12px; }
    #log-clear {
      background: none; border: none;
      color: var(--muted); font-family: 'JetBrains Mono', monospace;
      font-size: 10px; cursor: pointer; padding: 2px 6px;
      border-radius: 3px;
    }
    #log-clear:hover { color: var(--danger); }

    #log-entries {
      overflow-y: auto;
      flex: 1;
      padding: 8px 0;
    }
    #log-entries::-webkit-scrollbar { width: 3px; }
    #log-entries::-webkit-scrollbar-thumb { background: var(--border); }

    .log-entry {
      display: grid;
      grid-template-columns: 52px 14px 1fr;
      gap: 0 6px;
      padding: 3px 12px;
      font-size: 11px;
      line-height: 1.5;
      border-left: 2px solid transparent;
      word-break: break-all;
    }
    .log-entry:hover { background: rgba(255,255,255,.02); }
    .log-entry.info  { border-color: var(--muted); }
    .log-entry.ok    { border-color: var(--kick); }
    .log-entry.warn  { border-color: #f59e0b; }
    .log-entry.error { border-color: var(--danger); }

    .log-time  { color: var(--muted); font-size: 10px; padding-top: 1px; }
    .log-icon  { }
    .log-msg   { color: var(--text); }
    .log-entry.error .log-msg { color: var(--danger); }
    .log-entry.ok    .log-msg { color: var(--kick); }
    .log-entry.warn  .log-msg { color: #f59e0b; }

    .log-detail {
      grid-column: 3;
      color: var(--muted);
      font-size: 10px;
      white-space: pre-wrap;
      margin-top: 2px;
      background: rgba(255,255,255,.03);
      border-radius: 3px;
      padding: 4px 6px;
      max-height: 120px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">KICK<span>.</span></div>
    <div class="channel-info">
      <div class="channel-name" id="hdr-name">Caricamento…</div>
      <div class="channel-status">
        <span class="status-dot" id="dot"></span>
        <span id="hdr-status">connessione…</span>
      </div>
    </div>
    <div class="viewer-count" id="viewer-count">👁 —</div>
  </header>

  <div id="status-bar">Lettura config.json…</div>

  <div id="chat-wrap">
    <div id="chat-container">
      <div id="empty">
        <div class="big">💬</div>
        <div>In attesa di messaggi…</div>
      </div>
    </div>
    <button id="scroll-btn" onclick="scrollToBottom()">↓ nuovi messaggi</button>
  </div>

  <footer>
    <span>kick-chat-viewer</span>
    <a href="https://kick.com" target="_blank">kick.com</a>
  </footer>
</div>

<!-- Log panel -->
<button id="log-toggle" onclick="toggleLog()">🪲 LOG</button>
<div id="log-panel">
  <div id="log-header">
    <strong>Debug Log</strong>
    <button id="log-clear" onclick="clearLog()">svuota</button>
  </div>
  <div id="log-entries"></div>
</div>

<!-- Pusher SDK (CDN, no build needed) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pusher/8.3.0/pusher.min.js"></script>
<script>
// ─────────────────────────────────────────────
//  Kick Chat Viewer — GitHub Pages ready
//  Configura "streamer" in config.json
// ─────────────────────────────────────────────

const PUSHER_KEY     = 'eb1d5f283081a78b932c';
const PUSHER_HOST    = 'ws-us2.pusher.com';
const KICK_API_V2    = 'https://kick.com/api/v2/channels/';
const KICK_API_V1    = 'https://kick.com/api/v1/channels/';
const MAX_MESSAGES   = 200;

const chatEl    = document.getElementById('chat-container');
const statusBar = document.getElementById('status-bar');
const dot       = document.getElementById('dot');
const hdrName   = document.getElementById('hdr-name');
const hdrStatus = document.getElementById('hdr-status');
const scrollBtn = document.getElementById('scroll-btn');
const viewerEl  = document.getElementById('viewer-count');
const logToggle = document.getElementById('log-toggle');
const logPanel  = document.getElementById('log-panel');
const logEntries= document.getElementById('log-entries');
let   emptyEl   = document.getElementById('empty');

let autoScroll = true;
let msgCount   = 0;
let hasLogError = false;

// ══════════════════════════════════════════════
//  LOG SYSTEM
// ══════════════════════════════════════════════
const ICONS = { info: 'ℹ️', ok: '✅', warn: '⚠️', error: '❌' };

function log(level, msg, detail = null) {
  const now = new Date();
  const ts  = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;

  // also output to browser console
  const consoleFn = level === 'error' ? console.error : level === 'warn' ? console.warn : console.log;
  consoleFn(`[KickChat][${level.toUpperCase()}] ${msg}`, detail ?? '');

  const entry = document.createElement('div');
  entry.className = `log-entry ${level}`;

  let detailHtml = '';
  if (detail !== null && detail !== undefined) {
    let detailStr = typeof detail === 'string' ? detail : JSON.stringify(detail, null, 2);
    detailHtml = `<div class="log-detail">${escHtml(detailStr)}</div>`;
  }

  entry.innerHTML = `
    <span class="log-time">${ts}</span>
    <span class="log-icon">${ICONS[level] || 'ℹ️'}</span>
    <span class="log-msg">${escHtml(msg)}</span>
    ${detailHtml}
  `;

  logEntries.appendChild(entry);
  logEntries.scrollTop = logEntries.scrollHeight;

  if (level === 'error') {
    hasLogError = true;
    logToggle.classList.add('has-error');
  }
}

function toggleLog() {
  logPanel.classList.toggle('open');
  if (logPanel.classList.contains('open')) {
    logToggle.classList.remove('has-error');
    logEntries.scrollTop = logEntries.scrollHeight;
  }
}

function clearLog() {
  logEntries.innerHTML = '';
  hasLogError = false;
  logToggle.classList.remove('has-error');
}

// ══════════════════════════════════════════════
//  SCROLL
// ══════════════════════════════════════════════
chatEl.addEventListener('scroll', () => {
  const atBottom = chatEl.scrollHeight - chatEl.scrollTop - chatEl.clientHeight < 60;
  autoScroll = atBottom;
  scrollBtn.classList.toggle('visible', !atBottom);
});

function scrollToBottom() {
  chatEl.scrollTo({ top: chatEl.scrollHeight, behavior: 'smooth' });
  autoScroll = true;
  scrollBtn.classList.remove('visible');
}

// ══════════════════════════════════════════════
//  STATUS BAR
// ══════════════════════════════════════════════
function setStatus(msg, isError = false) {
  statusBar.textContent = msg;
  statusBar.className = isError ? 'error-bar' : '';
}

function setConnected(slug) {
  dot.className = 'status-dot live';
  hdrStatus.textContent = 'LIVE';
  hdrName.textContent = slug;
  setStatus(`Connesso a kick.com/${slug}`);
}

function setOffline(slug) {
  dot.className = 'status-dot';
  hdrStatus.textContent = 'offline';
  hdrName.textContent = slug;
  setStatus(`Connesso alla chat di ${slug} (stream offline)`);
}

// ══════════════════════════════════════════════
//  CHAT RENDERING
// ══════════════════════════════════════════════
function renderBadges(badges) {
  if (!badges || badges.length === 0) return '';
  return badges.map(b => {
    const type = b.type || '';
    let cls = 'badge';
    if      (type === 'broadcaster') cls += ' badge-broadcaster';
    else if (type === 'moderator')   cls += ' badge-moderator';
    else if (type === 'subscriber')  cls += ' badge-subscriber';
    else if (type === 'og')          cls += ' badge-og';
    else if (type === 'vip')         cls += ' badge-vip';
    else                             cls += ' badge-subscriber';
    return `<span class="${cls}">${type.substring(0,3)}</span>`;
  }).join('');
}

function colorFromName(name) {
  const colors = ['#53fc18','#3b82f6','#f59e0b','#ec4899','#06b6d4','#8b5cf6','#f97316','#10b981'];
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return colors[Math.abs(hash) % colors.length];
}

function addMessage(data) {
  if (emptyEl) { emptyEl.remove(); emptyEl = null; }

  const sender   = data.sender || {};
  const content  = data.content || data.message || '';
  const username = sender.username || sender.slug || '???';
  const badges   = renderBadges(sender.identity?.badges || []);
  const color    = sender.identity?.color || colorFromName(username);
  const now      = new Date();
  const time     = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

  const div = document.createElement('div');
  div.className = 'msg';
  div.innerHTML = `
    <span class="msg-meta">
      <span class="msg-badges">${badges}</span>
      <span class="msg-user" style="color:${color}">${escHtml(username)}</span>
      <span class="msg-sep">:</span>
    </span>
    <span class="msg-text">${escHtml(content)}</span>
    <span class="msg-time">${time}</span>
  `;

  chatEl.appendChild(div);
  msgCount++;
  if (msgCount > MAX_MESSAGES) {
    const first = chatEl.querySelector('.msg');
    if (first) { first.remove(); msgCount--; }
  }
  if (autoScroll) scrollToBottom();
}

function addSystemMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg-system';
  div.textContent = text;
  chatEl.appendChild(div);
  if (autoScroll) scrollToBottom();
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══════════════════════════════════════════════
//  MAIN INIT
// ══════════════════════════════════════════════
async function init() {
  log('info', 'Avvio Kick Chat Viewer');
  log('info', 'User Agent: ' + navigator.userAgent);
  log('info', 'URL pagina: ' + location.href);

  // ── STEP 1: leggi config.json ──
  log('info', 'STEP 1 — Lettura config.json');
  let config;
  try {
    const url = './config.json?_=' + Date.now();
    log('info', 'Fetch: ' + url);
    const res = await fetch(url);
    log('info', `Risposta HTTP: ${res.status} ${res.statusText}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    log('info', 'Testo grezzo ricevuto', text);
    config = JSON.parse(text);
    log('ok', 'config.json letto correttamente', config);
  } catch (e) {
    log('error', 'Impossibile leggere config.json', e.message);
    setStatus('Errore: impossibile leggere config.json', true);
    return;
  }

  const streamer = (config.streamer || '').trim().toLowerCase();
  if (!streamer) {
    log('error', 'Campo "streamer" mancante o vuoto in config.json');
    setStatus('Errore: campo "streamer" mancante in config.json', true);
    return;
  }
  log('ok', `Streamer da cercare: "${streamer}"`);
  hdrName.textContent = streamer;
  setStatus(`Recupero info canale per "${streamer}"…`);

  // ── STEP 2: API Kick v2 ──
  log('info', `STEP 2 — Chiamata API v2: ${KICK_API_V2}${streamer}`);
  let chatroomId = null;

  try {
    const res = await fetch(KICK_API_V2 + streamer, {
      headers: { 'Accept': 'application/json' }
    });
    log('info', `API v2 risposta HTTP: ${res.status} ${res.statusText}`);

    const responseText = await res.text();
    log('info', 'API v2 risposta grezza (primi 500 char)', responseText.substring(0, 500));

    if (!res.ok) throw new Error(`HTTP ${res.status}: ${responseText.substring(0,200)}`);

    const data = JSON.parse(responseText);
    log('ok', 'API v2 JSON parsato', {
      id: data.id,
      slug: data.slug,
      chatroom_id: data.chatroom?.id,
      is_live: data.livestream != null,
      viewer_count: data.livestream?.viewer_count ?? null,
    });

    chatroomId = data.chatroom?.id;
    const isLive  = data.livestream != null;
    const viewers = data.livestream?.viewer_count;

    if (isLive) {
      setConnected(streamer);
      log('ok', `Stream LIVE — spettatori: ${viewers}`);
      if (viewers != null) {
        viewerEl.textContent = `👁 ${viewers.toLocaleString('it')}`;
        viewerEl.classList.add('visible');
      }
    } else {
      setOffline(streamer);
      log('warn', 'Stream offline, ma la chat è disponibile');
    }
  } catch (e) {
    log('warn', 'API v2 fallita, provo v1', e.message);

    // ── STEP 2b: fallback API v1 ──
    try {
      log('info', `STEP 2b — Chiamata API v1: ${KICK_API_V1}${streamer}`);
      const res = await fetch(KICK_API_V1 + streamer);
      log('info', `API v1 risposta HTTP: ${res.status} ${res.statusText}`);

      const responseText = await res.text();
      log('info', 'API v1 risposta grezza (primi 500 char)', responseText.substring(0, 500));

      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = JSON.parse(responseText);
      chatroomId = data.chatroom?.id;

      log('ok', 'API v1 OK', { chatroom_id: chatroomId });
      setOffline(streamer);
    } catch (e2) {
      log('error', `Canale "${streamer}" non trovato su Kick (entrambe le API fallite)`, e2.message);
      setStatus(`Errore: canale "${streamer}" non trovato`, true);
      dot.className = 'status-dot error';
      return;
    }
  }

  if (!chatroomId) {
    log('error', 'chatroom.id è null/undefined nella risposta API — struttura JSON inattesa');
    setStatus('Errore: chatroom ID non trovato', true);
    return;
  }

  log('ok', `Chatroom ID ottenuto: ${chatroomId}`);

  // ── STEP 3: Pusher WebSocket ──
  log('info', `STEP 3 — Connessione Pusher (key: ${PUSHER_KEY}, host: ${PUSHER_HOST})`);
  log('info', `Canale Pusher: chatrooms.${chatroomId}.v2`);
  setStatus(`Connessione WebSocket (chatroom #${chatroomId})…`);

  let pusher;
  try {
    pusher = new Pusher(PUSHER_KEY, {
      wsHost: 'ws-us2.pusher.com',
      wsPort: 443,
      wssPort: 443,
      forceTLS: true,
      enabledTransports: ['ws', 'wss'],
      disableStats: true,
    });
    log('ok', 'Pusher istanziato (wsHost: ws-us2.pusher.com)');
  } catch(e) {
    log('error', 'Errore creazione Pusher', e.message);
    setStatus('Errore Pusher: ' + e.message, true);
    return;
  }

  pusher.connection.bind('connecting', ()  => log('info', 'Pusher: connecting…'));
  pusher.connection.bind('connected',  ()  => {
    log('ok', 'Pusher: connesso! Socket ID: ' + pusher.connection.socket_id);
    addSystemMsg('✓ Connesso alla chat');
  });
  pusher.connection.bind('disconnected', () => {
    log('warn', 'Pusher: disconnesso');
    dot.className = 'status-dot';
    hdrStatus.textContent = 'disconnesso';
    setStatus('Disconnesso — riconnessione…', true);
    addSystemMsg('⚠ Disconnesso dalla chat, riconnessione…');
  });
  pusher.connection.bind('failed', () => {
    log('error', 'Pusher: connessione fallita (WebSocket non supportato o bloccato?)');
    setStatus('Errore: connessione WebSocket fallita', true);
  });
  pusher.connection.bind('error', (err) => {
    log('error', 'Pusher connection error', JSON.stringify(err));
    setStatus('Errore WebSocket', true);
    dot.className = 'status-dot error';
  });

  const channel = pusher.subscribe(`chatrooms.${chatroomId}.v2`);
  log('info', 'Pusher: iscritto al canale, in attesa di messaggi…');

  channel.bind('pusher:subscription_succeeded', () => {
    log('ok', 'Pusher: subscription_succeeded — iscrizione confermata');
  });
  channel.bind('pusher:subscription_error', (err) => {
    log('error', 'Pusher: subscription_error', JSON.stringify(err));
  });

  channel.bind('App\\Events\\ChatMessageSent', (data) => {
    log('info', `Messaggio ricevuto da: ${data?.sender?.username}`, {
      content: data?.content,
      chatroom_id: data?.chatroom_id,
      sender_id: data?.sender?.id,
    });
    addMessage(data);
  });

  // Ascolta TUTTI gli eventi per debug
  channel.bind_global((eventName, data) => {
    if (eventName !== 'App\\Events\\ChatMessageSent') {
      log('info', `Evento Pusher: ${eventName}`, typeof data === 'object' ? JSON.stringify(data).substring(0,200) : data);
    }
  });

  log('ok', 'Init completato — in ascolto per messaggi');
}

init();
</script>
</body>
</html>
